<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Chatbot</title>
    <style>
        /* ── Reset & Base ─────────────────────────────────── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:        #f4f6f9;
            --surface:   #ffffff;
            --primary:   #4f46e5;
            --primary-light: #e0e7ff;
            --accent:    #10b981;
            --text:      #1e293b;
            --text-muted:#64748b;
            --border:    #e2e8f0;
            --user-bg:   #4f46e5;
            --user-text: #ffffff;
            --bot-bg:    #f1f5f9;
            --bot-text:  #1e293b;
            --radius:    12px;
            --shadow:    0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06);
            --shadow-lg: 0 10px 25px rgba(0,0,0,.1);
        }

        html, body {
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen,
                         Ubuntu, Cantarell, 'Helvetica Neue', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }

        /* ── Layout ───────────────────────────────────────── */
        .app {
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 860px;
            margin: 0 auto;
            background: var(--surface);
            box-shadow: var(--shadow-lg);
        }

        /* ── Header ───────────────────────────────────────── */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
            background: var(--surface);
            flex-shrink: 0;
        }
        .header h1 {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--primary);
        }
        .header-actions { display: flex; gap: 8px; }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: background .15s, transform .1s;
        }
        .btn:active { transform: scale(.97); }
        .btn-ghost {
            background: transparent;
            color: var(--text-muted);
        }
        .btn-ghost:hover { background: var(--primary-light); color: var(--primary); }
        .btn-primary {
            background: var(--primary);
            color: #fff;
        }
        .btn-primary:hover { background: #4338ca; }

        /* ── Messages Area ────────────────────────────────── */
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scroll-behavior: smooth;
        }

        .msg {
            display: flex;
            gap: 12px;
            max-width: 82%;
            animation: fadeIn .25s ease;
        }
        .msg.user { align-self: flex-end; flex-direction: row-reverse; }
        .msg.bot  { align-self: flex-start; }

        .avatar {
            width: 36px; height: 36px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 1rem;
            flex-shrink: 0;
            font-weight: 700;
        }
        .msg.user .avatar { background: var(--user-bg); color: #fff; }
        .msg.bot  .avatar { background: var(--accent); color: #fff; }

        .bubble {
            padding: 12px 16px;
            border-radius: var(--radius);
            line-height: 1.55;
            font-size: 0.95rem;
            word-wrap: break-word;
            white-space: pre-wrap;
        }
        .msg.user .bubble { background: var(--user-bg); color: var(--user-text); border-bottom-right-radius: 4px; }
        .msg.bot  .bubble { background: var(--bot-bg);  color: var(--bot-text);  border-bottom-left-radius: 4px; }

        .typing-indicator span {
            display: inline-block;
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--text-muted);
            animation: blink 1.2s infinite;
            margin-right: 4px;
        }
        .typing-indicator span:nth-child(2) { animation-delay: .2s; }
        .typing-indicator span:nth-child(3) { animation-delay: .4s; margin-right: 0; }

        /* ── Input Bar ────────────────────────────────────── */
        .input-bar {
            display: flex;
            align-items: flex-end;
            gap: 12px;
            padding: 16px 24px;
            border-top: 1px solid var(--border);
            background: var(--surface);
            flex-shrink: 0;
        }
        .input-bar textarea {
            flex: 1;
            resize: none;
            border: 2px solid var(--border);
            border-radius: var(--radius);
            padding: 12px 16px;
            font-size: 0.95rem;
            font-family: inherit;
            line-height: 1.5;
            outline: none;
            transition: border-color .2s;
            max-height: 150px;
            min-height: 46px;
        }
        .input-bar textarea:focus { border-color: var(--primary); }
        .input-bar textarea::placeholder { color: var(--text-muted); }

        .send-btn {
            width: 46px; height: 46px;
            border: none;
            border-radius: 50%;
            background: var(--primary);
            color: #fff;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: background .15s, transform .1s;
            flex-shrink: 0;
        }
        .send-btn:hover { background: #4338ca; }
        .send-btn:active { transform: scale(.92); }
        .send-btn:disabled { opacity: .5; cursor: not-allowed; }

        /* ── Status Bar ───────────────────────────────────── */
        .status-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 6px 24px;
            font-size: 0.78rem;
            color: var(--text-muted);
            border-top: 1px solid var(--border);
            background: var(--surface);
            flex-shrink: 0;
        }
        .status-dot {
            display: inline-block;
            width: 8px; height: 8px;
            border-radius: 50%;
            margin-right: 6px;
            background: var(--accent);
        }
        .status-dot.disconnected { background: #ef4444; }

        /* ── Settings Panel ───────────────────────────────── */
        .overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,.3);
            z-index: 100;
            display: none;
            align-items: center; justify-content: center;
        }
        .overlay.open { display: flex; }

        .panel {
            background: var(--surface);
            border-radius: 16px;
            padding: 28px;
            width: 90%;
            max-width: 440px;
            box-shadow: var(--shadow-lg);
        }
        .panel h2 { font-size: 1.15rem; margin-bottom: 20px; }
        .field { margin-bottom: 16px; }
        .field label {
            display: block;
            font-size: 0.82rem;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 6px;
        }
        .field input, .field textarea, .field select {
            width: 100%;
            padding: 10px 12px;
            border: 2px solid var(--border);
            border-radius: 8px;
            font-size: 0.9rem;
            font-family: inherit;
            outline: none;
            transition: border-color .2s;
        }
        .field input:focus, .field textarea:focus, .field select:focus { border-color: var(--primary); }
        .field textarea { resize: vertical; min-height: 70px; }
        .panel-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }

        /* ── Welcome ──────────────────────────────────────── */
        .welcome {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
        }
        .welcome h2 { font-size: 1.4rem; color: var(--text); margin-bottom: 8px; }
        .welcome p { max-width: 400px; margin: 0 auto; }

        /* ── Animations ───────────────────────────────────── */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes blink  { 0%,100% { opacity: .3; } 50% { opacity: 1; } }

        /* ── Responsive ───────────────────────────────────── */
        @media (max-width: 640px) {
            .app { max-width: 100%; }
            .messages { padding: 16px; }
            .input-bar { padding: 12px 16px; }
            .header { padding: 12px 16px; }
            .msg { max-width: 90%; }
        }
    </style>
</head>
<body>
<div class="app">

    <!-- Header -->
    <header class="header">
        <h1>🤖 AI Chatbot</h1>
        <div class="header-actions">
            <button class="btn btn-ghost" onclick="openSettings()" title="Settings">⚙️ Settings</button>
            <button class="btn btn-ghost" onclick="newSession()" title="New chat">🔄 New</button>
        </div>
    </header>

    <!-- Messages -->
    <div class="messages" id="messages">
        <div class="welcome" id="welcome">
            <h2>Welcome!</h2>
            <p>Start a conversation below. Your AI assistant is ready to help.</p>
        </div>
    </div>

    <!-- Input -->
    <div class="input-bar">
        <textarea id="userInput" placeholder="Type your message…" rows="1"
                  onkeydown="handleKeyDown(event)"></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
    </div>

    <!-- Status -->
    <div class="status-bar">
        <span><span class="status-dot" id="statusDot"></span><span id="statusText">Connected</span></span>
        <span id="sessionInfo"></span>
    </div>
</div>

<!-- Settings Overlay -->
<div class="overlay" id="settingsOverlay" onclick="closeSettingsOutside(event)">
    <div class="panel" onclick="event.stopPropagation()">
        <h2>⚙️ Chat Settings</h2>
        <div class="field">
            <label for="settingModel">Model</label>
            <input id="settingModel" placeholder="e.g. gpt-4o-mini (leave empty for default)" />
        </div>
        <div class="field">
            <label for="settingTemp">Temperature: <span id="tempValue">0.7</span></label>
            <input id="settingTemp" type="range" min="0" max="2" step="0.1" value="0.7"
                   oninput="document.getElementById('tempValue').textContent = this.value" />
        </div>
        <div class="field">
            <label for="settingSystem">System Prompt</label>
            <textarea id="settingSystem" placeholder="Custom system prompt (optional)"></textarea>
        </div>
        <div class="panel-actions">
            <button class="btn btn-ghost" onclick="closeSettings()">Cancel</button>
            <button class="btn btn-primary" onclick="saveSettings()">Save</button>
        </div>
    </div>
</div>

<script>
// ── State ────────────────────────────────────────────────
let sessionId = null;
let ws = null;
let isStreaming = false;

const messagesEl  = document.getElementById('messages');
const inputEl     = document.getElementById('userInput');
const sendBtn     = document.getElementById('sendBtn');
const statusDot   = document.getElementById('statusDot');
const statusText  = document.getElementById('statusText');
const sessionInfo = document.getElementById('sessionInfo');
const welcomeEl   = document.getElementById('welcome');

// ── WebSocket Connection ─────────────────────────────────
function connectWS() {
    const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
    const url = `${protocol}//${location.host}/api/chat/stream`;
    ws = new WebSocket(url);

    ws.onopen = () => {
        statusDot.classList.remove('disconnected');
        statusText.textContent = 'Connected';
    };

    ws.onclose = () => {
        statusDot.classList.add('disconnected');
        statusText.textContent = 'Disconnected — reconnecting…';
        setTimeout(connectWS, 2000);
    };

    ws.onerror = () => ws.close();

    ws.onmessage = (event) => {
        const data = JSON.parse(event.data);

        if (data.error) {
            appendMessage('bot', '⚠️ ' + data.error);
            finishStreaming();
            return;
        }

        if (data.session_id) sessionId = data.session_id;

        if (!data.done) {
            appendDelta(data.delta);
        } else {
            finishStreaming();
        }
    };
}

// ── Send Message ─────────────────────────────────────────
function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || isStreaming) return;

    // Hide welcome
    if (welcomeEl) welcomeEl.style.display = 'none';

    appendMessage('user', text);
    inputEl.value = '';
    autoResize();

    isStreaming = true;
    sendBtn.disabled = true;

    // Show typing indicator then replace with streamed content
    showTyping();

    const payload = {
        message: text,
        session_id: sessionId,
        model: document.getElementById('settingModel').value || undefined,
        system_prompt: document.getElementById('settingSystem').value || undefined,
        temperature: parseFloat(document.getElementById('settingTemp').value) || 0.7,
    };

    if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify(payload));
    } else {
        // Fallback: use REST API
        fetch('/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload),
        })
        .then(r => r.json())
        .then(data => {
            removeTyping();
            if (data.detail) {
                appendMessage('bot', '⚠️ ' + data.detail);
            } else {
                if (data.session_id) sessionId = data.session_id;
                appendMessage('bot', data.message);
            }
            finishStreaming();
        })
        .catch(err => {
            removeTyping();
            appendMessage('bot', '⚠️ Network error: ' + err.message);
            finishStreaming();
        });
    }

    updateSessionInfo();
}

// ── Message Rendering ────────────────────────────────────
function appendMessage(role, content) {
    const div = document.createElement('div');
    div.className = `msg ${role}`;

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = role === 'user' ? 'U' : 'AI';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = content;

    div.appendChild(avatar);
    div.appendChild(bubble);
    messagesEl.appendChild(div);
    scrollToBottom();
    return bubble;
}

function appendDelta(delta) {
    // Remove typing indicator on first delta
    removeTyping();

    let bubble = document.querySelector('.msg.bot:last-child .bubble');
    if (!bubble || bubble.dataset.streaming !== 'true') {
        const div = document.createElement('div');
        div.className = 'msg bot';

        const avatar = document.createElement('div');
        avatar.className = 'avatar';
        avatar.textContent = 'AI';

        bubble = document.createElement('div');
        bubble.className = 'bubble';
        bubble.dataset.streaming = 'true';

        div.appendChild(avatar);
        div.appendChild(bubble);
        messagesEl.appendChild(div);
    }
    bubble.textContent += delta;
    scrollToBottom();
}

function showTyping() {
    const div = document.createElement('div');
    div.className = 'msg bot';
    div.id = 'typing';

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = 'AI';

    const bubble = document.createElement('div');
    bubble.className = 'bubble typing-indicator';
    bubble.innerHTML = '<span></span><span></span><span></span>';

    div.appendChild(avatar);
    div.appendChild(bubble);
    messagesEl.appendChild(div);
    scrollToBottom();
}

function removeTyping() {
    const el = document.getElementById('typing');
    if (el) el.remove();
}

function finishStreaming() {
    isStreaming = false;
    sendBtn.disabled = false;
    // Remove streaming flag
    const bubble = document.querySelector('.bubble[data-streaming="true"]');
    if (bubble) delete bubble.dataset.streaming;
    inputEl.focus();
}

function scrollToBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
}

function updateSessionInfo() {
    sessionInfo.textContent = sessionId ? `Session: ${sessionId.slice(0, 8)}…` : '';
}

// ── New Session ──────────────────────────────────────────
function newSession() {
    sessionId = null;
    messagesEl.innerHTML = `
        <div class="welcome" id="welcome">
            <h2>Welcome!</h2>
            <p>Start a conversation below. Your AI assistant is ready to help.</p>
        </div>`;
    updateSessionInfo();
    inputEl.focus();
}

// ── Settings ─────────────────────────────────────────────
function openSettings() {
    document.getElementById('settingsOverlay').classList.add('open');
}
function closeSettings() {
    document.getElementById('settingsOverlay').classList.remove('open');
}
function closeSettingsOutside(e) {
    if (e.target === e.currentTarget) closeSettings();
}
function saveSettings() {
    closeSettings();
}

// ── Input Helpers ────────────────────────────────────────
function handleKeyDown(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
    }
}

function autoResize() {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 150) + 'px';
}

inputEl.addEventListener('input', autoResize);

// ── Init ─────────────────────────────────────────────────
connectWS();
inputEl.focus();
</script>
</body>
</html>
